services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blog_app
    ports:
      - "5434:5432"
    restart: unless-stopped

    container_name: blog_app_postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: